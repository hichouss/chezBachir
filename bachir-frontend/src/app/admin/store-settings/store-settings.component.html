<h1 class="page-title">Paramètres du magasin</h1>

@if (success) { <div class="alert alert-success">{{ success }}</div> }
@if (error)   { <div class="alert alert-error">{{ error }}</div> }

<div class="settings-card card">
  <div class="form-grid">
    <div class="form-group">
      <label>Nom du magasin</label>
      <input type="text" [(ngModel)]="info.name" />
    </div>
    <div class="form-group">
      <label>Téléphone</label>
      <input type="text" [(ngModel)]="info.phone" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="info.email" />
    </div>
    <div class="form-group">
      <label>Adresse</label>
      <input type="text" [(ngModel)]="info.address" />
    </div>
    <div class="form-group form-group--full">
      <label>Description</label>
      <textarea [(ngModel)]="info.description" rows="3"></textarea>
    </div>
    <div class="form-group form-group--full">
      <label>Horaires d'ouverture <small>(une ligne par jour, ex: Lundi : 8h - 19h)</small></label>
      <textarea [(ngModel)]="info.openingHours" rows="8" placeholder="Lundi : 8h00 - 19h00&#10;Mardi : 8h00 - 19h00&#10;..."></textarea>
    </div>
    <div class="form-group form-group--full">
      <label>URL Google Maps (iframe src)</label>
      <input type="text" [(ngModel)]="info.mapUrl" placeholder="https://www.google.com/maps/embed?..." />
    </div>
    <div class="form-group">
      <label>Facebook</label>
      <input type="text" [(ngModel)]="info.facebookUrl" />
    </div>
    <div class="form-group">
      <label>Instagram</label>
      <input type="text" [(ngModel)]="info.instagramUrl" />
    </div>
  </div>
  <button class="btn btn-primary" (click)="save()">💾 Enregistrer</button>
</div>
